<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skogsinventering v2 - Masterkarta</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style_2.css">
</head>
<body>

    <header>
        <div class="logo">🌲 Föreningens Skogskarta v2</div>
        <div id="coords">Koordinater: -</div>
    </header>

    <div id="main-container">
        <aside id="sidebar">
            <div id="controls">
                
                <div class="search-container" style="margin-bottom: 15px; display: flex; gap: 5px;">
                    <input type="text" id="map-search" placeholder="Sök diarienr eller namn..." 
                        style="flex-grow: 1; padding: 8px; border-radius: 4px; border: 1px solid #ccc;">
                    <button id="search-btn" style="padding: 8px 15px; cursor: pointer; background: #2c3e50; color: white; border: none; border-radius: 4px;">🔍</button>
                </div>
                
                <div class="filter-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="check-typ-arende" checked> 
                        <span class="legend-color blue"></span> <strong>Pågående ärenden</strong>
                    </label>
                </div>

                <div class="filter-group" style="margin-top: 10px;">
                    <label class="checkbox-label">
                        <input type="checkbox" id="check-typ-egen" checked> 
                        <span class="legend-color purple"></span> <strong>Egna projekt</strong>
                    </label>
                    
                    <div class="submenu" id="submenu-egen">
                        <label class="checkbox-label">
                            <input type="checkbox" id="check-skede-planerad" checked> Planerade
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="check-skede-klar" checked> Inventerade
                        </label>
                    </div>
                </div>

                <div class="control-group sks-container">
                    <label class="checkbox-label">
                        <input type="checkbox" id="layer-sks"> <strong>SKS-anmälningar</strong>
                    </label>
                    <div class="weeks-row">
                        <span>Senaste:</span>
                        <input type="number" id="weeks-input" value="12" min="1" style="width: 45px;">
                        <span>veckor</span>
                    </div>
                    <div class="weeks-row" style="margin-top: 5px;">
                        <span class="legend-color red"></span> <span>&lt; 6 v</span>
                        <span class="legend-color orange" style="margin-left: 10px;"></span> <span>&gt; 6 v</span>
                    </div>
                </div>

                <hr>
                
                <label class="checkbox-label">
                    <input type="checkbox" id="layer-arter"> Visa artpunkter
                </label>

                <select id="basemap-select" style="margin-top: 10px; width: 100%;">
                    <option value="topo">Topografisk Karta</option>
                    <option value="sat">Flygfoto</option>
                </select>
            </div>

            <div id="info-panel">
                <div id="placeholder-text">Klicka på ett område på kartan för att se detaljer.</div>
                <div id="data-content" style="display:none;">
                    <h2 id="info-title" style="margin-bottom: 5px;">Huvudområde</h2>
                    <p id="info-fastighet" style="font-style: italic; color: #666; margin-bottom: 10px;">Fastighet: -</p>
                    
                    <div id="info-prio-status" style="border-left: 4px solid #ccc; padding-left: 10px; margin-bottom: 15px;">
                        <p><strong>Dnr:</strong> <span id="info-dnr">-</span></p>
                        <p><strong>Prioritet:</strong> <span id="info-prio">-</span></p>
                        <p><strong>Juridik:</strong> <span id="info-juridik">-</span></p>
                    </div>

                    <div class="info-section">
                        <label>🎯 NÄSTA STEG:</label>
                        <div id="info-next-step" class="highlight-box">-</div>
                    </div>

                    <div class="info-section">
                        <label>🌿 PRIORITERADE ARTER:</label>
                        <div id="info-arter">-</div>
                    </div>

                    <div class="info-section">
                        <label>📝 KOMMENTARER & LOGG:</label>
                        <div id="info-comment" class="comment-box"></div>
                    </div>

                    <div id="link-container" style="margin-top: 15px;">
                        <a id="btn-open-doc" href="#" target="_blank" class="action-button">Öppna dokumentation</a>
                    </div>
                </div>
            </div>
        </aside>

        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="script_2.js"></script>

</body>
</html>
