<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta property="og:title" content="Inventeringskarta - Uppsala län">
    <meta property="og:description" content="Karta över inventeringar och avverkningsanmälningar i Uppsala län.">
    <meta property="og:image" content="https://tomasfalk64.github.io/Inventeringar/preview.png">
    <meta property="og:url" content="https://tomasfalk64.github.io/Inventeringar/">
    <meta property="og:type" content="website">

    <title>Skogsinventering v2 - Masterkarta</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style_2.css">
</head>
<body>

    <header>
        <div class="logo">Inventeringskarta</div>
        <div id="coords">Koordinater: -</div>
    </header>

    <div id="main-container">
        <aside id="sidebar">
            <div id="controls">
                
                <div class="search-container">
                    <input type="text" id="map-search" placeholder="Sök diarienr eller namn..." aria-label="Sök diarienummer eller namn">
                    <button id="search-btn" type="button" aria-label="Starta sökning">🔍</button>
                </div>
                <div id="status-message" role="status" aria-live="polite"></div>
                
                <div class="filter-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="check-typ-arende" checked> 
                        <span class="legend-color blue"></span> <strong>Pågående ärenden</strong>
                    </label>
                </div>

                <div class="filter-group filter-group-top">
                    <label class="checkbox-label">
                        <input type="checkbox" id="check-typ-egen" checked> 
                        <span class="legend-color purple"></span> <strong>Egna projekt</strong>
                    </label>
                    
                    <div class="submenu" id="submenu-egen">
                        <label class="checkbox-label">
                            <input type="checkbox" id="check-skede-planerad" checked> Planerade
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="check-skede-klar" checked> Inventerade
                        </label>
                    </div>
                </div>

                <div class="control-group sks-container">
                    <label class="checkbox-label">
                        <input type="checkbox" id="layer-sks"> <strong>SKS-anmälningar</strong>
                    </label>
                    <div class="weeks-row">
                        <span>Senaste:</span>
                        <input type="number" id="weeks-input" value="12" min="1" aria-label="Antal veckor för SKS-filter">
                        <span>veckor</span>
                    </div>
                    <div class="weeks-row weeks-row-legend">
                        <span class="legend-color red"></span> <span>&lt; 6 v</span>
                        <span class="legend-color orange legend-color-spaced"></span> <span>&gt; 6 v</span>
                    </div>
                </div>

                <hr>
                

                <select id="basemap-select" aria-label="Välj bakgrundskarta">
                    <option value="topo">Topografisk Karta</option>
                    <option value="sat">Flygfoto</option>
                </select>
            </div>

            <div id="info-panel">
                <div id="placeholder-text">Klicka på ett område på kartan för att se detaljer.</div>
                <div id="data-content" class="is-hidden">
                    <h2 id="info-title">-</h2>
                    <p id="info-fastighet">-</p>
                    
                    <div id="view-master" class="info-view">
                        <div class="prio-status-box master-border">
                            <p><strong>Dnr:</strong> <span id="info-dnr">-</span></p>
                            <p><strong>Inkom:</strong> <span id="info-inkom">-</span></p>
                            <p><strong>Åtgärd:</strong> <span id="info-atgard">-</span></p>
                            <p><strong>Prioritet:</strong> <span id="info-prio">-</span></p>
                            <p><strong>Juridik:</strong> <span id="info-juridik">-</span></p>
                        </div>
                        
                        <div class="info-section">
                            <label>NÄSTA STEG:</label>
                            <div id="info-next-step" class="highlight-box">-</div>
                        </div>

                        <div class="info-section">
                            <label>PRIORITERADE ARTER:</label>
                            <div id="info-arter" class="species-box">-</div>
                        </div>
                    </div>

                    <div id="view-sks" class="info-view sks-border is-hidden">
                        <div class="sks-data-grid">
                            <p><strong>Beteckning:</strong> <span id="sks-dnr">-</span></p>
                            <p><strong>Typ:</strong> <span id="sks-typ">-</span></p>
                            <p><strong>Areal:</strong> <span id="sks-ha">-</span>&nbsp;ha</p>
                            <p><strong>Inkomdatum:</strong> <span id="sks-datum">-</span></p>
                            <p><strong>Status:</strong> <span id="sks-status">-</span></p>
                            <p><strong>Skogstyp:</strong> <span id="sks-skogstyp">-</span></p>
                            
                        </div>
                    </div>

                    <div class="info-section info-section-comments">
                        <label id="comment-label">KOMMENTARER:</label>
                        <div id="info-comment" class="comment-box"></div>
                    </div>
                </div>

                <a id="btn-open-doc" class="my-button-class is-hidden" href="#" target="_blank" rel="noopener noreferrer">
                    Öppna projektmapp
                </a>
            </div>

            
        </aside>

        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="script_2.js"></script>

</body>
</html>
